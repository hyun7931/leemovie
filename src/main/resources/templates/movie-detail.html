<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>영화 상세 정보</title>
</head>
<body>
    <h1 th:text="${movie.title}">영화 제목</h1>
    <img th:src="${movie.imageUrl}" width="300"/>
    <p>평점: <span th:text="${movie.rating}">0.0</span></p>
    <p>설명: <span th:text="${movie.description}">설명</span></p>

    <hr>
    <h3>리뷰 목록</h3>
    <ul>
        <li th:each="review : ${reviews}">
            <strong th:text="${review.author}">작성자</strong>:
            <span th:text="${review.content}">내용</span>
            (<span th:text="${review.rating}">평점</span>)
        </li>
    </ul>

    <h3>리뷰 남기기</h3>
    <form th:action="@{/movies/{id}/reviews(id=${movie.movieId})}" method="post">
        <div>
            <label>작성자: </label>
            <input type="text" name="author" required>
        </div>
        <div>
            <label>내용: </label>
            <textarea name="content" required></textarea>
        </div>
        <div>
            <label>평점: </label>
            <input type="number" name="rating" step="0.1" min="0" max="5" required>
        </div>
        <button type="submit">리뷰 등록</button>
    </form>

    <a href="/movies">목록으로 돌아가기</a>
</body>
</html>
